name: Build and Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * 4"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run build
        run: node build.js

      - name: Generate tag
        id: tag
        run: |
          TAG=$(TZ=Asia/Shanghai date +"%Y%m%d%H%M%S")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Zip lib directory
        run: |
          cd lib
          zip -r ../quickjs.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: quickjs.zip